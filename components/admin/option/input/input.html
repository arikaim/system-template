<div 
    class="ui action input" 
    option-name="{{ name }}"
    validator-rule="{{ rule }}"
    id="{{ component_id }}">
    <button 
        class="{{ theme.buttons.menu }} clear-option-button mr-2" 
        title="{{ labels.clear }}">
        {{ component('icons~close',theme.icons.delete,'svg') }}
    </button>
    <input 
        {{ rule|attr('rule') }}
        name="{{ name }}"
        value="{{ value }}"
        type="text" 
        placeholder="{{ placeholder }}">      
    <button class="btn btn-xs my-auto btn-success save-option-button">
        {{ labels.save }}
    </button>
</div>
